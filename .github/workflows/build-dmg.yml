name: Build DMG

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Version string baked into the bundle (e.g. 0.2.0)"
        required: false
        default: ""

permissions:
  contents: write   # needed to create a Release on tag pushes

jobs:
  build:
    name: Build Hush.dmg (macOS arm64)
    # macos-15 = Apple Silicon (arm64) + Xcode 16 (needed by FluidAudio's swift-tools-version 6.0).
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # so the build script can read git short SHA

      - name: Select Xcode (16.x)
        run: sudo xcode-select -s /Applications/Xcode_16.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Cache SwiftPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Derive version / build number
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="0.0.0-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION"            >> "$GITHUB_OUTPUT"
          echo "build_number=$(date -u +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Build app bundle + DMG (ad-hoc signed)
        env:
          VERSION:       ${{ steps.ver.outputs.version }}
          BUILD_NUMBER:  ${{ steps.ver.outputs.build_number }}
          BUILD_SOURCE:  ci-github-actions
          SKIP_NOTARIZE: "1"
          CREATE_DMG:    "1"
          SIGN_IDENTITY: "-"   # ad-hoc; replace with Developer ID for notarized release
        run: ./scripts/dist/build_and_sign.sh

      - name: Rename DMG with version
        id: dmg
        run: |
          SRC="dist/Hush.dmg"
          DEST="dist/Hush-${{ steps.ver.outputs.version }}.dmg"
          mv "$SRC" "$DEST"
          echo "path=$DEST" >> "$GITHUB_OUTPUT"
          shasum -a 256 "$DEST" | tee "$DEST.sha256"

      - name: Upload DMG as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hush-${{ steps.ver.outputs.version }}-dmg
          path: |
            ${{ steps.dmg.outputs.path }}
            ${{ steps.dmg.outputs.path }}.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
          generate_release_notes: true
          files: |
            ${{ steps.dmg.outputs.path }}
            ${{ steps.dmg.outputs.path }}.sha256
          body: |
            ## Hush ${{ steps.ver.outputs.version }}

            **Download:** [`Hush-${{ steps.ver.outputs.version }}.dmg`](./Hush-${{ steps.ver.outputs.version }}.dmg)

            > ⚠️ This build is **ad-hoc signed**, not notarized. On first launch macOS will
            > say *"Apple cannot check it for malicious software"*. To open:
            >
            > 1. Drag `Hush.app` to `/Applications`.
            > 2. Right-click → **Open** → **Open** in the dialog. (Or run
            >    `xattr -dr com.apple.quarantine /Applications/Hush.app` in Terminal.)
            >
            > You only need to do this once.
